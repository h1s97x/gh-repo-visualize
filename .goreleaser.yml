# GoReleaser configuration
# https://goreleaser.com

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    main: ./cmd/gh-repo-visualize
    binary: gh-repo-visualize
    ldflags:
      - -s -w -X main.Version={{.Version}} -X main.BuildDate={{.Date}} -X main.BuildCommit={{.Commit}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - typo

release:
  github:
    owner: h1s97x
    name: gh-repo-visualize
  footer: |
    ## Installation
    
    ```bash
    gh extension install h1s97x/gh-repo-visualize
    ```
    
    **Full Changelog**: https://github.com/h1s97x/gh-repo-visualize/compare/{{ .PreviousTag }}...{{ .Tag }}

