name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  cross-build:
    name: Cross-platform Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build for Linux
        run: GOOS=linux GOARCH=amd64 go build -o bin/gh-repo-visualize-linux-amd64 ./cmd/gh-repo-visualize

      - name: Build for macOS (Intel)
        run: GOOS=darwin GOARCH=amd64 go build -o bin/gh-repo-visualize-darwin-amd64 ./cmd/gh-repo-visualize

      - name: Build for macOS (ARM)
        run: GOOS=darwin GOARCH=arm64 go build -o bin/gh-repo-visualize-darwin-arm64 ./cmd/gh-repo-visualize

      - name: Build for Windows
        run: GOOS=windows GOARCH=amd64 go build -o bin/gh-repo-visualize-windows-amd64.exe ./cmd/gh-repo-visualize

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
